[mypy]
python_version = 3.10
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
ignore_missing_imports = True
explicit_package_bases = True
exclude = (\.git/|__pycache__/|dist/|build/|.*\.egg-info/|\.opencode/|\.pytest_cache/|node_modules/|tests/|^test_)

[mypy-monitor.api]
ignore_errors = True

[mypy-automations.instagram]
ignore_errors = True

[mypy-automations.instagram_flow]
ignore_errors = True

[mypy-tasks.phone_call]
ignore_errors = True

[mypy-tasks.concrete]
ignore_errors = True

[mypy-monitor.poller]
ignore_errors = True

[mypy-core.chronos.worker]
ignore_errors = True

[mypy-config.loader]
ignore_errors = True