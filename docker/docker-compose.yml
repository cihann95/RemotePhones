# Docker Compose — Phone Farm Backup
# One command → working API: `docker-compose up` from project root.
#
# Usage from PROJECT ROOT (recommended):
#   docker-compose -f docker/docker-compose.yml up -d
#   curl http://localhost:8000/health
#
# Usage from docker/ directory:
#   cd docker
#   docker-compose up -d
#
# Optional Redis (off by default, opt-in via profile):
#   docker-compose -f docker/docker-compose.yml --profile with-redis up -d

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: phone-farm-api:latest
    container_name: phone-farm-api
    restart: unless-stopped

    # Map host:container. Override host side with "API_PORT=8000" env var if 8000 is busy.
    ports:
      - "${API_PORT:-8000}:8000"

    # Environment loaded from .env at PROJECT ROOT.
    # Copy ../.env.example to ../.env and fill in API_SECRET_KEY before first run.
    env_file:
      - ../.env
    environment:
      # Container-internal defaults (override via .env if needed)
      PYTHONUNBUFFERED: "1"
      # Home (EV) or Office (OFIS) mode — used by Office-mode networking
      PHONE_FARM_MODE: "${PHONE_FARM_MODE:-home}"
      # When using --profile with-redis, point the API at the redis service
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"

    # Persistent log volume + read-only config mount.
    # Logs survive `docker-compose down` (but NOT `docker-compose down -v`).
    volumes:
      - phone-farm-logs:/app/logs
      - ../config:/app/config:ro
      # SQLite JobQueue DB — persisted across container restarts
      - phone-farm-data:/app/data

    # Healthcheck: use the in-Dockerfile curl probe if available, fall back to
    # Python urllib (works even if curl binary is stripped from a slim image).
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health', timeout=3); sys.exit(0 if r.status == 200 else 1)\" || curl -fsS http://localhost:8000/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource limits — sane defaults for a headless API service.
    # Bump limits if you run large bulk-call jobs.
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

    # Network mode for ADB-over-USB. `host` is the most reliable for ADB
    # passthrough on Linux; remove this if you prefer bridge networking.
    # network_mode: host

    # ─────────────────────────────────────────────────────────────────────
    # USB / ADB device passthrough — UNCOMMENT the block below on the host
    # OS that matches your setup. By default it is OFF so the API still
    # starts on hosts with no Android devices attached.
    #
    # LINUX (host machine has /dev/bus/usb, e.g. Ubuntu/Fedora/Arch):
    #   - add the docker user to the `plugdev` group, or
    #   - run: `sudo chmod -R 666 /dev/bus/usb` before `docker-compose up`
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb
    # privileged: true   # required for some ADB setups that need raw USB
    #
    # WINDOWS (Docker Desktop, WSL2 backend):
    #   - Use usbipd-win to attach the device to WSL first:
    #     `usbipd wsl attach --busid <BUS_ID>`
    #   - Then uncomment the devices: line above inside WSL.
    #   - Docker Desktop → Settings → Resources → WSL Integration: ON
    #
    # macOS (Docker Desktop):
    #   - USB passthrough is limited; consider running ADB natively on the
    #     host and pointing REDIS_URL/adb at the container over the network.
    #   - For experimental support, uncomment devices: AND privileged: true.
    # ─────────────────────────────────────────────────────────────────────

    # Treat the api and redis services as a single start group: api waits
    # until redis (when enabled) is healthy before starting.
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # Optional — only starts with `--profile with-redis` so it does NOT add
  # resource overhead to the default `docker-compose up` flow.
  redis:
    image: redis:7-alpine
    container_name: phone-farm-redis
    profiles: ["with-redis"]
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # Persist cache across restarts; size capped at ~256 MB.
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - phone-farm-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  phone-farm-logs:
    name: phone-farm-logs
  phone-farm-data:
    name: phone-farm-data
  phone-farm-redis:
    name: phone-farm-redis

# Top-level network. The api and redis services share `phone-farm-net` so
# the API can reach the cache via the hostname `redis` (see REDIS_URL above).
networks:
  default:
    name: phone-farm-net
